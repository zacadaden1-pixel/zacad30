<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACCAD 30 - HOME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ZACCAD 30 CHALLENGE</div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn active">🏠 Home</a>
            <a href="history.html" class="nav-btn">📊 History</a>
        </div>
    </nav>

    <section class="section hero-bg">
        <div class="dashboard">
            <div class="stats-container">
                <div class="stat-box">
                    <h4>Perfect Days ✅</h4>
                    <div id="perfectCount" class="count success">0</div>
                </div>
                <div class="stat-box">
                    <h4>Missed Days ❌</h4>
                    <div id="missedCount" class="count failed">0</div>
                </div>
                <div class="stat-box">
                    <h4>Current Day</h4>
                    <div id="displayCurrentDay" class="count accent-text">1</div>
                </div>
            </div>

            <div class="main-layout">
                <div class="left-col">
                    <div class="status-card">
                        <h3>Daily Habits</h3>
                        <div id="habitInputs">
                            <div class="habit-row-group">
                                <label class="habit-row main-habit">
                                    <input type="checkbox" class="habit-check" data-name="Gym" id="gymCheck"> 
                                    <span>🏋️ Gym Workout</span>
                                </label>
                                <label class="rest-day-label">
                                    <input type="checkbox" id="gymRest"> 
                                    <span>Mark as Rest Day</span>
                                </label>
                            </div>
                            <label class="habit-row"><input type="checkbox" class="habit-check" data-name="NOT G"> 🚫 NOT G</label>
                            <label class="habit-row"><input type="checkbox" class="habit-check" data-name="Read 30m"> 📚 Read (30 Min)</label>
                            <label class="habit-row"><input type="checkbox" class="habit-check" data-name="1L Water"> 💧 Drink 1L Water</label>
                        </div>
                    </div>

                    <div class="status-card" style="margin-top: 20px;">
                        <h3>Today's Progress</h3>
                        <div class="btn-group">
                            <button class="btn btn-reset" onclick="resetCheckboxes()">RESET CHECKS</button>
                            <button class="btn btn-submit" onclick="submitDay()">SUBMIT & NEXT</button>
                        </div>
                    </div>
                </div>

                <div class="right-col">
                    <div class="status-card">
                        <h3 style="color:var(--accent);">🕌 5 Prayers</h3>
                        <div id="prayerInputs">
                            <label class="habit-row"><input type="checkbox" class="prayer-check" data-name="Fajr"> Fajr</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check" data-name="Dhuhr"> Dhuhr</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check" data-name="Asr"> Asr</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check" data-name="Maghrib"> Maghrib</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check" data-name="Isha"> Isha</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let currentDay = parseInt(localStorage.getItem('zac_day')) || 1;
        let historyData = JSON.parse(localStorage.getItem('zac_hist')) || {};

        function updateStats() {
            let perfect = 0; let missed = 0;
            Object.values(historyData).forEach(day => { if(day.allDone) perfect++; else missed++; });
            document.getElementById('perfectCount').innerText = perfect;
            document.getElementById('missedCount').innerText = missed;
            document.getElementById('displayCurrentDay').innerText = currentDay;
        }

        function resetCheckboxes() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        }

        function submitDay() {
            let dayData = { habits: [], prayers: [], allDone: true };
            const isRestDay = document.getElementById('gymRest').checked;
            
            document.querySelectorAll('.habit-check').forEach(cb => {
                let status = cb.checked;
                let name = cb.dataset.name;
                if(name === "Gym" && isRestDay) { status = true; name = "Gym (Rest)"; }
                dayData.habits.push({ name: name, status: status });
                if(!status) dayData.allDone = false;
            });

            document.querySelectorAll('.prayer-check').forEach(cb => {
                dayData.prayers.push({ name: cb.dataset.name, status: cb.checked });
                if(!cb.checked) dayData.allDone = false;
            });

            historyData[currentDay] = dayData;
            currentDay++;
            localStorage.setItem('zac_hist', JSON.stringify(historyData));
            localStorage.setItem('zac_day', currentDay);
            resetCheckboxes();
            updateStats();
            alert("Day Submitted! Check the History tab for details.");
        }
        updateStats();
    </script>
</body>
</html>
