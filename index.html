<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACCAD 30 - HOME</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* PROFESSIONAL NOTIFICATION STYLES */
        #lockNotification {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* GOLD THEME STYLES (LVL 2) */
        .gold-mode .navbar {
            background: linear-gradient(90deg, #1e293b 0%, #854d0e 50%, #1e293b 100%);
            border-bottom: 2px solid #fbbf24;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }
        .gold-mode #levelBadge {
            background: #fbbf24 !important;
            color: #000 !important;
            box-shadow: 0 0 10px #fbbf24;
        }
        .gold-mode #streakCount {
            text-shadow: 0 0 10px #fbbf24;
            color: #fbbf24 !important;
        }

        /* PURPLE THEME STYLES (LVL 3) */
        .purple-mode .navbar {
            background: linear-gradient(90deg, #1e293b 0%, #581c87 50%, #1e293b 100%);
            border-bottom: 2px solid #a855f7;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }
        .purple-mode #levelBadge {
            background: #a855f7 !important;
            color: #fff !important;
            box-shadow: 0 0 10px #a855f7;
        }
    </style>
</head>
<body id="mainBody">
    <nav class="navbar" id="topNav">
        <div class="logo-container" style="display: flex; flex-direction: column; align-items: flex-start;">
            <div class="logo" style="line-height: 1;">ZACCAD 30</div>
            <span id="levelBadge" class="level-badge" style="margin-top: 4px; margin-left: 0;">LVL 1: ROOKIE</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn active">🏠 Home</a>
            <a href="forge.html" class="nav-btn">⚡ Forge</a>
            <a href="history.html" class="nav-btn">📊 History</a>
        </div>
    </nav>

    <section class="section hero-bg">
        <div class="dashboard">
            <div id="lockNotification">⚠️ ACTION REQUIRED: You must click "START CHALLENGE" to begin tracking.</div>

            <div class="status-card" style="text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--accent);">
                <h2 id="dateRangeDisplay" style="color: var(--accent); letter-spacing: 1px; font-size: 1.2rem; margin: 0;">SET CHALLENGE DATE</h2>
            </div>

            <div id="startChallengeContainer" style="text-align: center; margin-bottom: 20px; display: none;">
                <button class="btn btn-submit" style="background: var(--accent); color: #000; font-weight: 800; padding: 15px 40px; border-radius: 12px; border: none; cursor: pointer;" onclick="startChallenge()">🚀 START CHALLENGE</button>
            </div>

            <div class="stats-container">
                <div class="stat-box"><h4>Streak 🔥</h4><div id="streakCount" class="count" style="color: var(--accent);">0</div></div>
                <div class="stat-box"><h4>Success ✅</h4><div id="perfectCount" class="count success">0</div></div>
                <div class="stat-box"><h4>Current Day</h4><div id="displayCurrentDay" class="count accent-text">1</div></div>
            </div>

            <div class="main-layout">
                <div class="left-col">
                    <div class="status-card">
                        <h3>Daily Habits</h3>
                        <div id="habitInputs">
                            <div class="habit-row-group">
                                <label class="habit-row"><input type="checkbox" class="habit-check auto-save lockable" data-name="Gym" data-weight="2"> 🏋️ Gym Workout (2 pts)</label>
                                <label class="rest-day-label"><input type="checkbox" id="gymRest" class="auto-save lockable"> <span>Mark as Rest day</span></label>
                            </div>
                            <label class="habit-row" style="border: 1px solid #ef4444; padding: 10px; border-radius: 8px;">
                                <input type="checkbox" class="habit-check auto-save lockable" data-name="NOT G" data-weight="3"> 
                                <strong style="color: #ef4444;">🚫 NOT G (Mandatory)</strong>
                            </label>
                            <label class="habit-row"><input type="checkbox" class="habit-check auto-save lockable" data-name="Read Quran" data-weight="1"> 📖 Read Quran j1 (1 pt)</label>
                            <label class="habit-row"><input type="checkbox" class="habit-check auto-save lockable" data-name="Cold Shower" data-weight="1"> ❄️ Early Cold Shower (1 pt)</label>
                            <label class="habit-row"><input type="checkbox" class="habit-check auto-save lockable" data-name="Read 30m" data-weight="1"> 📚 Read 30 Min (1 pt)</label>
                            <label class="habit-row"><input type="checkbox" class="habit-check auto-save lockable" data-name="1L Water" data-weight="1"> 💧 Drink 1L Water (1 pt)</label>
                        </div>
                    </div>

                    <div class="status-card" style="margin-top: 20px;">
                        <h3>30 Day Progress</h3>
                        <div class="day-grid" id="trackerGrid"></div>
                    </div>
                </div>

                <div class="right-col">
                    <div class="status-card">
                        <h3 style="color:var(--accent);">🕌 5 Prayers</h3>
                        <div id="prayerInputs">
                            <label class="habit-row"><input type="checkbox" class="prayer-check auto-save lockable" data-name="Fajr" data-weight="3"> Fajr (3 pts)</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check auto-save lockable" data-name="Dhuhr" data-weight="1.5"> Dhuhr (1.5 pts)</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check auto-save lockable" data-name="Asr" data-weight="3"> Asr (3 pts)</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check auto-save lockable" data-name="Maghrib" data-weight="1.5"> Maghrib (1.5 pts)</label>
                            <label class="habit-row"><input type="checkbox" class="prayer-check auto-save lockable" data-name="Isha" data-weight="1.5"> Isha (1.5 pts)</label>
                        </div>
                    </div>
                    
                    <div class="btn-group" style="display:flex; flex-direction: column; gap:10px; margin-top:20px;">
                        <button class="btn btn-submit" style="width:100%" onclick="submitDay()">SUBMIT DAY</button>
                        <button class="btn btn-reset" style="width:100%; opacity: 0.6; font-size: 0.8rem;" onclick="resetCheckboxes()">RESET CHALLENGE</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const PASS = "SACAD30";
        let currentDay = parseInt(localStorage.getItem('zac_day')) || 1;
        let historyData = JSON.parse(localStorage.getItem('zac_hist')) || {};

        function startChallenge() {
            const now = new Date();
            const end = new Date();
            end.setDate(now.getDate() + 30);
            localStorage.setItem('zac_start_date', now.toISOString());
            localStorage.setItem('zac_end_date', end.toISOString());
            localStorage.setItem('zac_day', 1);
            location.reload();
        }

        // PROFESSIONAL LOCK LOGIC
        function checkChallengeStarted(e) {
            if (!localStorage.getItem('zac_start_date')) {
                e.preventDefault();
                const note = document.getElementById('lockNotification');
                note.style.display = 'block';
                // Automatically scroll to the top to see the red warning
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return false;
            }
        }

        function saveDraft() {
            if (!localStorage.getItem('zac_start_date')) return;
            const draft = {};
            document.querySelectorAll('.auto-save').forEach((cb, index) => { draft[index] = cb.checked; });
            localStorage.setItem('zac_draft', JSON.stringify(draft));
        }

        function loadDraft() {
            const draft = JSON.parse(localStorage.getItem('zac_draft'));
            if (draft) {
                document.querySelectorAll('.auto-save').forEach((cb, index) => {
                    cb.checked = draft[index] || false;
                });
            }
        }

        function updateDateHeader() {
            const startStr = localStorage.getItem('zac_start_date');
            const endStr = localStorage.getItem('zac_end_date');
            if(startStr && endStr) {
                const s = new Date(startStr); const e = new Date(endStr);
                const opt = { day: 'numeric', month: 'short' };
                document.getElementById('dateRangeDisplay').innerText = `${s.toLocaleDateString('en-GB', opt)} - ${e.toLocaleDateString('en-GB', opt)} CHALLENGE`;
            }
        }

        function calculateStreak() {
            let streak = 0;
            for (let i = currentDay - 1; i >= 1; i--) {
                if (historyData[i] && historyData[i].allDone) streak++; else break;
            }
            return streak;
        }

        function updateStats() {
            let perfect = 0;
            Object.values(historyData).forEach(day => { if(day.allDone) perfect++; });
            const streak = calculateStreak();
            document.getElementById('perfectCount').innerText = perfect;
            document.getElementById('streakCount').innerText = streak;
            document.getElementById('displayCurrentDay').innerText = currentDay;
            const body = document.getElementById('mainBody');
            const badge = document.getElementById('levelBadge');
            body.classList.remove('gold-mode', 'purple-mode');
            if (streak >= 20) { body.classList.add('purple-mode'); badge.innerText = "LVL 3: ELITE"; }
            else if (streak >= 10) { body.classList.add('gold-mode'); badge.innerText = "LVL 2: GOLD"; }
            else { badge.innerText = "LVL 1: ROOKIE"; }
        }

        function initGrid() {
            const grid = document.getElementById('trackerGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const day = document.createElement('div');
                day.classList.add('day-box');
                day.innerText = i;
                if(i === currentDay) day.classList.add('active');
                if(historyData[i]) day.classList.add(historyData[i].allDone ? 'success' : 'failed');
                grid.appendChild(day);
            }
        }

        function submitDay() {
            if (!localStorage.getItem('zac_start_date')) {
                const note = document.getElementById('lockNotification');
                note.style.display = 'block';
                return;
            }
            let dayData = { habits: [], prayers: [], allDone: false, score: 0 };
            const isRestDay = document.getElementById('gymRest').checked;
            let totalPossible = 0; let earned = 0; let failedPriority = false;

            document.querySelectorAll('.habit-check').forEach(cb => {
                const weight = parseFloat(cb.dataset.weight);
                const name = cb.dataset.name;
                totalPossible += weight;
                let status = cb.checked;
                if(name === "Gym" && isRestDay) status = true;
                if(name === "NOT G" && !status) failedPriority = true;
                if(status) earned += weight;
                dayData.habits.push({ name: name, status: status });
            });

            document.querySelectorAll('.prayer-check').forEach(cb => {
                const weight = parseFloat(cb.dataset.weight);
                totalPossible += weight;
                if(cb.checked) earned += weight;
                dayData.prayers.push({ name: cb.dataset.name, status: cb.checked });
            });

            const bonuses = parseInt(localStorage.getItem('zac_bonus_points')) || 0;
            earned += bonuses;
            dayData.score = Math.round((earned / totalPossible) * 100);
            dayData.allDone = (!failedPriority && dayData.score >= 70);

            if(dayData.allDone) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#ffffff', '#f59e0b'] });
                setTimeout(() => proceed(dayData), 1000);
            } else { proceed(dayData); }
        }

        function proceed(dayData) {
            historyData[currentDay] = dayData;
            currentDay++;
            localStorage.setItem('zac_hist', JSON.stringify(historyData));
            localStorage.setItem('zac_day', currentDay);
            localStorage.removeItem('zac_bonus_points');
            localStorage.removeItem('zac_draft'); 
            location.reload();
        }

        function resetCheckboxes() {
            if(prompt("Enter Password to Reset") === PASS) {
                localStorage.clear();
                location.reload();
            }
        }

        // Apply Event Listeners
        document.querySelectorAll('.lockable').forEach(cb => {
            cb.addEventListener('click', checkChallengeStarted);
            cb.addEventListener('change', saveDraft);
        });

        window.onload = () => {
            if(!localStorage.getItem('zac_start_date')) {
                document.getElementById('startChallengeContainer').style.display = 'block';
            }
            loadDraft();
            updateStats(); 
            initGrid();
            updateDateHeader();
        };
    </script>
</body>
</html>
