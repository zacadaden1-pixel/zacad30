<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACCAD 30 - FORGE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .forge-card { border: 2px solid var(--accent); background: rgba(6, 182, 212, 0.05); }
        #bonusTasks { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .bonus-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .timer-box { text-align: center; padding: 30px; background: #0f172a; border-radius: 15px; margin-top: 20px; border: 1px solid var(--accent); position: relative; }
        #timerDisplay { font-size: 3.5rem; font-family: monospace; color: var(--accent); margin-bottom: 15px; font-weight: bold; }
        .timer-input-group { margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .manual-input { background: #1e293b; border: 1px solid var(--accent); color: white; padding: 8px; border-radius: 6px; width: 80px; text-align: center; font-size: 1.2rem; }

        /* Custom Notification Style */
        #finishNotify {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { top: -50px; } to { top: 20px; } }

        .gold-mode .navbar { background: linear-gradient(90deg, #1e293b 0%, #854d0e 50%, #1e293b 100%); border-bottom: 2px solid #fbbf24; }
        .purple-mode .navbar { background: linear-gradient(90deg, #1e293b 0%, #581c87 50%, #1e293b 100%); border-bottom: 2px solid #a855f7; }
    </style>
</head>
<body id="mainBody">
    <div id="finishNotify">🎯 SESSION COMPLETE! 🔊</div>

    <audio id="finishSound" src="672d7d5d6107dfc5cb446a45f84b74dc.m4a" loop></audio>

    <nav class="navbar" id="topNav">
        <div class="logo-container" style="display: flex; flex-direction: column; align-items: flex-start;">
            <div class="logo" style="line-height: 1;">ZACCAD 30</div>
            <span id="levelBadge" class="level-badge" style="margin-top: 4px; font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: var(--accent); font-weight: 800;">LVL 1: ROOKIE</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">🏠 Home</a>
            <a href="forge.html" class="nav-btn active">⚡ Forge</a>
            <a href="history.html" class="nav-btn">📊 History</a>
        </div>
    </nav>

    <section class="section hero-bg">
        <div class="dashboard">
            <div class="status-card forge-card">
                <h2 style="color: var(--accent);">⚡ Bonus Forge</h2>
                <div id="bonusTasks">
                    <label class="bonus-item"><span>🎤 180s Talk Topic</span><input type="checkbox" class="bonus-check" data-id="0"></label>
                    <label class="bonus-item"><span>💪 100 Pushups</span><input type="checkbox" class="bonus-check" data-id="1"></label>
                    <label class="bonus-item"><span>📻 Watch Full Broadcast</span><input type="checkbox" class="bonus-check" data-id="2"></label>
                </div>
            </div>

            <div class="timer-box">
                <h3>🎯 Focus Mode</h3>
                <div class="timer-input-group" id="inputSection">
                    <input type="number" id="manualMinutes" class="manual-input" value="60">
                    <span style="color: #94a3b8;">Minutes</span>
                </div>
                <div id="timerDisplay">00:00</div>
                <div class="btn-group" style="justify-content: center; gap: 10px;">
                    <button class="nav-btn" id="timerBtn" onclick="toggleTimer()">START</button>
                    <button class="nav-btn" onclick="resetTimer()">RESET</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let timerId = null;
        let isRunning = false;

        function updateTimerDisplay(seconds) {
            let m = Math.floor(seconds / 60); 
            let s = seconds % 60;
            document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function toggleTimer() {
            const finishAudio = document.getElementById('finishSound');
            const timerBtn = document.getElementById('timerBtn');
            const notify = document.getElementById('finishNotify');

            if (!isRunning) {
                let endTime = localStorage.getItem('zac_timer_end');
                
                if (!endTime) {
                    const mins = parseInt(document.getElementById('manualMinutes').value) || 0;
                    if (mins <= 0) return;
                    endTime = Date.now() + (mins * 60 * 1000);
                    localStorage.setItem('zac_timer_end', endTime);
                }

                document.getElementById('inputSection').style.display = 'none';
                timerBtn.innerText = "RUNNING...";
                isRunning = true;

                timerId = setInterval(() => {
                    const now = Date.now();
                    const remaining = Math.round((endTime - now) / 1000);

                    if (remaining <= 0) {
                        clearInterval(timerId);
                        updateTimerDisplay(0);
                        localStorage.removeItem('zac_timer_end');
                        
                        // Start music immediately (No alert blocking it)
                        finishAudio.play().catch(e => console.log("Audio play failed: ", e));
                        notify.style.display = 'block';
                        
                        timerBtn.innerText = "DONE!";
                        isRunning = false;
                    } else {
                        updateTimerDisplay(remaining);
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            localStorage.removeItem('zac_timer_end');
            isRunning = false;
            
            // Stop music and hide notification
            const audio = document.getElementById('finishSound');
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('finishNotify').style.display = 'none';

            document.getElementById('timerDisplay').innerText = "00:00";
            document.getElementById('timerBtn').innerText = "START";
            document.getElementById('inputSection').style.display = 'flex';
        }

        function checkExistingTimer() {
            const endTime = localStorage.getItem('zac_timer_end');
            if (endTime) {
                const remaining = Math.round((endTime - Date.now()) / 1000);
                if (remaining > 0) {
                    toggleTimer();
                } else {
                    localStorage.removeItem('zac_timer_end');
                }
            }
        }

        function saveBonus() {
            const state = {};
            document.querySelectorAll('.bonus-check').forEach(cb => { state[cb.dataset.id] = cb.checked; });
            localStorage.setItem('zac_bonus_state', JSON.stringify(state));
            localStorage.setItem('zac_bonus_points', document.querySelectorAll('.bonus-check:checked').length);
        }

        window.onload = () => {
            const state = JSON.parse(localStorage.getItem('zac_bonus_state'));
            document.querySelectorAll('.bonus-check').forEach(cb => {
                if (state?.[cb.dataset.id]) cb.checked = true;
                cb.addEventListener('change', saveBonus);
            });
            checkExistingTimer();
        };
    </script>
</body>
</html>
