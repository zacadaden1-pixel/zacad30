<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACCAD 30 - FORGE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .forge-card { border: 2px solid var(--accent); background: rgba(6, 182, 212, 0.05); }
        .bonus-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.03); padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .timer-box { text-align: center; padding: 30px; background: #0f172a; border-radius: 15px; margin-top: 20px; border: 1px solid var(--accent); }
        #timerDisplay { font-size: 3.5rem; font-family: monospace; color: var(--accent); margin-bottom: 15px; font-weight: bold; }

        /* GOLD THEME STYLES (LVL 2) */
        .gold-mode .navbar {
            background: linear-gradient(90deg, #1e293b 0%, #854d0e 50%, #1e293b 100%);
            border-bottom: 2px solid #fbbf24;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }
        .gold-mode .level-badge {
            background: #fbbf24 !important;
            color: #000 !important;
            box-shadow: 0 0 10px #fbbf24;
        }
        .gold-mode .forge-card, .gold-mode .timer-box {
            border-color: #fbbf24;
        }
        .gold-mode #timerDisplay, .gold-mode h2, .gold-mode h3 {
            color: #fbbf24 !important;
        }

        /* PURPLE THEME STYLES (LVL 3) */
        .purple-mode .navbar {
            background: linear-gradient(90deg, #1e293b 0%, #581c87 50%, #1e293b 100%);
            border-bottom: 2px solid #a855f7;
        }
        .purple-mode .level-badge { background: #a855f7 !important; color: #fff !important; }
    </style>
</head>
<body id="mainBody">
    <nav class="navbar" id="topNav">
        <div class="logo-container" style="display: flex; flex-direction: column; align-items: flex-start;">
            <div class="logo" style="line-height: 1;">ZACCAD 30</div>
            <span id="levelBadge" class="level-badge" style="margin-top: 4px; margin-left: 0; font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: var(--accent); font-weight: 800;">LVL 1: ROOKIE</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">🏠 Home</a>
            <a href="forge.html" class="nav-btn active">⚡ Forge</a>
            <a href="history.html" class="nav-btn">📊 History</a>
        </div>
    </nav>

    <section class="section hero-bg">
        <div class="dashboard">
            <div class="status-card forge-card">
                <h2 style="color: var(--accent);">⚡ Bonus Forge</h2>
                <p style="color: #94a3b8; margin-bottom: 20px;">+1 point each. Use these to save a failing day.</p>
                <div id="bonusTasks">
                    <label class="bonus-item"><span>🎤 180s Talk Topic</span><input type="checkbox" class="bonus-check"></label>
                    <label class="bonus-item"><span>💪 100 Pushups</span><input type="checkbox" class="bonus-check"></label>
                    <label class="bonus-item"><span>📻 Watch Full Broadcast</span><input type="checkbox" class="bonus-check"></label>
                </div>
            </div>
            <div class="timer-box">
                <h3>🎯 Focus Mode</h3>
                <div id="timerDisplay">60:00</div>
                <div class="btn-group" style="justify-content: center; gap: 10px;">
                    <button class="nav-btn" id="timerBtn" onclick="toggleTimer()">START</button>
                    <button class="nav-btn" onclick="resetTimer()">RESET</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let timeLeft = 3600; let timerId = null;
        let historyData = JSON.parse(localStorage.getItem('zac_hist')) || {};
        let currentDay = parseInt(localStorage.getItem('zac_day')) || 1;

        // CALCULATE STREAK TO SET THEME
        function updateForgeTheme() {
            let streak = 0;
            for (let i = currentDay - 1; i >= 1; i--) {
                if (historyData[i] && historyData[i].allDone) streak++; else break;
            }

            const body = document.getElementById('mainBody');
            const badge = document.getElementById('levelBadge');
            body.classList.remove('gold-mode', 'purple-mode');

            if (streak >= 20) {
                body.classList.add('purple-mode');
                badge.innerText = "LVL 3: ELITE";
            } else if (streak >= 10) {
                body.classList.add('gold-mode');
                badge.innerText = "LVL 2: GOLD";
            } else {
                badge.innerText = "LVL 1: ROOKIE";
            }
        }

        document.querySelectorAll('.bonus-check').forEach(cb => {
            cb.addEventListener('change', () => {
                let count = document.querySelectorAll('.bonus-check:checked').length;
                localStorage.setItem('zac_bonus_points', count);
            });
        });

        function toggleTimer() {
            if (timerId) { clearInterval(timerId); timerId = null; document.getElementById('timerBtn').innerText = "RESUME"; }
            else {
                timerId = setInterval(() => {
                    timeLeft--; updateTimerDisplay();
                    if (timeLeft <= 0) { clearInterval(timerId); alert("Focus Done! +1 Bonus earned."); }
                }, 1000);
                document.getElementById('timerBtn').innerText = "PAUSE";
            }
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetTimer() { clearInterval(timerId); timerId = null; timeLeft = 3600; updateTimerDisplay(); document.getElementById('timerBtn').innerText = "START"; }

        // Initial Theme Load
        updateForgeTheme();
    </script>
</body>
</html>
