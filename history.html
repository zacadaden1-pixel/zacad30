<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACCAD 30 - HISTORY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mobile Scroll Fix for the Log */
        @media (max-width: 900px) {
            .table-container {
                width: 100%;
                overflow-x: auto;
                background: rgba(15, 23, 42, 0.3);
                border-radius: 8px;
            }
            .history-table {
                min-width: 450px; /* Adjusted to fit content better */
            }
            /* FIX: Mosque icons below prayer label and centered on mobile */
            .mini-icons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 2px;
                min-width: 60px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body id="mainBody">
    <nav class="navbar no-print">
        <div class="logo">ZACCAD 30 <span id="levelBadge" class="level-badge">LVL 1</span></div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">🏠 Home</a>
            <a href="history.html" class="nav-btn active">📊 History</a>
        </div>
    </nav>

    <section class="section hero-bg">
        <div class="dashboard">
            
            <div class="status-card no-print" style="margin-bottom: 20px;">
                <h3 style="color:var(--accent); margin-bottom: 20px;">Performance Analytics</h3>
                <div class="analytics-grid">
                    <div class="stat-item" style="margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>Challenge Completion</span>
                            <span id="compText">0%</span>
                        </div>
                        <div class="progress-bar-bg"><div id="compBar" class="progress-fill accent-bg"></div></div>
                    </div>
                    <div class="stat-item" style="margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>Success Rate (70%+)</span>
                            <span id="perfText">0%</span>
                        </div>
                        <div class="progress-bar-bg"><div id="perfBar" class="progress-fill success-bg"></div></div>
                    </div>
                    <div class="stat-item">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>Miss Rate (Failures)</span>
                            <span id="missText">0%</span>
                        </div>
                        <div class="progress-bar-bg"><div id="missBar" class="progress-fill failed-bg"></div></div>
                    </div>
                </div>
            </div>

            <div class="status-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3>30-Day Log</h3>
                    <button class="nav-btn no-print" onclick="window.print()" style="background:var(--success); color:#0f172a; border:none; cursor:pointer; font-weight:bold;">🖨️ Print</button>
                </div>
                <div class="table-container">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Day</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th>Habits</th>
                                <th>Prayers</th>
                            </tr>
                        </thead>
                        <tbody id="fullHistoryList"></tbody>
                    </table>
                </div>
                <button class="btn btn-danger no-print" style="margin-top:20px" onclick="clearAll()">RESET DATA</button>
            </div>
        </div>
    </section>

    <script>
        const historyData = JSON.parse(localStorage.getItem('zac_hist')) || {};
        const currentDay = parseInt(localStorage.getItem('zac_day')) || 1;
        
        function updateAnalytics() {
            const entryCount = Object.keys(historyData).length;
            let perfect = 0; let missed = 0;
            Object.values(historyData).forEach(day => { if(day.allDone) perfect++; else missed++; });
            
            let streak = 0;
            for (let i = currentDay - 1; i >= 1; i--) {
                if (historyData[i] && historyData[i].allDone) streak++; else break;
            }
            const body = document.getElementById('mainBody');
            const badge = document.getElementById('levelBadge');
            if (streak >= 20) { body.classList.add('purple-theme'); badge.innerText = "LVL 3: ELITE"; badge.style.background = "#a855f7"; }
            else if (streak >= 10) { body.classList.add('gold-theme'); badge.innerText = "LVL 2: GOLD"; badge.style.background = "#fbbf24"; }

            const compPerc = Math.round((entryCount / 30) * 100);
            const perfPerc = entryCount > 0 ? Math.round((perfect / entryCount) * 100) : 0;
            const missPerc = entryCount > 0 ? Math.round((missed / entryCount) * 100) : 0;

            document.getElementById('compBar').style.width = compPerc + "%";
            document.getElementById('compText').innerText = compPerc + "%";
            document.getElementById('perfBar').style.width = perfPerc + "%";
            document.getElementById('perfText').innerText = perfPerc + "%";
            document.getElementById('missBar').style.width = missPerc + "%";
            document.getElementById('missText').innerText = missPerc + "%";
        }

        function renderHistory() {
            const container = document.getElementById('fullHistoryList');
            if (Object.keys(historyData).length === 0) {
                container.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:20px;'>No entries yet.</td></tr>";
                return;
            }
            let html = "";
            for (let i = 1; i <= 30; i++) {
                const data = historyData[i]; if (!data) continue;
                html += `<tr>
                    <td>Day ${i}</td>
                    <td>${data.score}%</td>
                    <td class="${data.allDone ? 'success-text' : 'failed-text'}">${data.allDone ? 'SUCCESS' : 'FAILED'}</td>
                    <td><div class="mini-icons">${data.habits.map(h => h.status ? '✅' : '❌').join('')}</div></td>
                    <td><div class="mini-icons">${data.prayers.map(p => p.status ? '🕌' : '⚪').join('')}</div></td>
                </tr>`;
            }
            container.innerHTML = html;
        }

        function clearAll() { if(confirm("Clear all progress?")) { localStorage.clear(); window.location.href = "index.html"; } }
        updateAnalytics(); renderHistory();
    </script>
</body>
</html>
